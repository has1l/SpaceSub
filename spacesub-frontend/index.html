<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#020810" />
    <title>SpaceSub — Центр мониторинга подписок</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Catch module loading errors that would cause a white screen.
      // This runs BEFORE any type="module" scripts (non-module scripts execute first).
      window.addEventListener('error', function(e) {
        if (document.getElementById('root') && document.getElementById('root').children.length === 0) {
          document.getElementById('root').innerHTML =
            '<div style="color:#ef4444;background:#0f172a;padding:2rem;font-family:monospace;min-height:100vh">' +
            '<h2 style="color:#f97316">SpaceSub: JavaScript Error</h2>' +
            '<pre style="white-space:pre-wrap;color:#e2e8f0">' +
            (e.message || 'Unknown error') + '\n' +
            (e.filename ? 'File: ' + e.filename + ':' + e.lineno : '') +
            '</pre></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[SpaceSub] Unhandled rejection:', e.reason);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
